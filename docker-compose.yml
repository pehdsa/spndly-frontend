name: spndly-frontend

services:
  frontend:
    build:
      context: .
      dockerfile: ./docker/frontend/Dockerfile
    container_name: spndly-frontend
    ports:
      - "5173:5173"
    env_file: .env
    environment:
      VITE_API_URL: http://spndly-backend:8000
    volumes:
      - ./:/app
      - /app/node_modules
    command: ["sh", "-lc", "npm install && npm run dev -- --host 0.0.0.0 --port 5173"]
    networks: [spndly_net]

networks:
  spndly_net:
    external: true